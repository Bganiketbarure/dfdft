<!-- ================= PROTOTYPING PAGE ================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Prototyping - BVNAB</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{min-width:1200px;background:#0a0a0a;color:#fff}

.header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:45px}
.back{color:#ff1a1a;text-decoration:none;border:1px solid #ff1a1a;padding:8px 16px;border-radius:20px}

h1{text-align:center;color:#ff1a1a;margin-top:10px}

.main{display:flex;width:85%;margin:40px auto;gap:30px;align-items:center}

.image-box{flex:1}
.image-box img{width:100%;border-radius:15px}

.form-box{flex:1;background:rgba(255,255,255,0.05);padding:25px;border-radius:15px}

input,textarea{
 width:100%;
 padding:10px;
 margin-top:10px;
 background:#111;
 border:1px solid #333;
 color:#fff;
 border-radius:10px;
}

button{
 margin-top:15px;
 padding:12px;
 width:100%;
 background:#ff1a1a;
 border:none;
 color:#fff;
 border-radius:25px;
 cursor:pointer;
}

.features{
 width:85%;
 margin:30px auto;
 display:flex;
 gap:20px;
 flex-wrap:wrap;
}

.feature{
 flex:1;
 min-width:200px;
 background:#111;
 padding:15px;
 border-radius:10px;
 text-align:center;
}

</style>

<script>
function sendProto(){
 let name=document.getElementById('name').value;
 let idea=document.getElementById('idea').value;
 let message=`Hello, I want Prototyping Service%0AName: ${name}%0AIdea: ${idea}%0A(I will share files/details on WhatsApp)`;
 window.open(`https://wa.me/919356368018?text=${message}`,'_blank');
}
</script>

</head>

<body>

<div class="header">
 <div class="logo">
   <img src="Screenshot 2026-04-06 103500.png">
   <span>BVNAB</span>
 </div>
 <a href="stem.html" class="back">← Back</a>
</div>

<h1>Prototyping & Product Development</h1>

<div class="main">

 <!-- IMAGE SIDE -->
 <div class="image-box">
   <img src="OIP.webp">
 </div>

 <!-- FORM SIDE -->
 <div class="form-box">
   <h2>Start Your Project</h2>
   <input type="text" id="name" placeholder="Your Name">
   <textarea id="idea" placeholder="Describe your idea/project/Budget"></textarea>
   <button onclick="sendProto()">Send WhatsApp</button>
 </div>

</div>

<div class="features">
 <div class="feature">Concept to Prototype</div>
 <div class="feature">Student & Startup Support</div>
</div>

</body>
</html>
