<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BVNAB Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
 font-family:'Poppins',sans-serif;
}

body{
 height:100vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 background:linear-gradient(135deg,#0a0a0a,#111);
 color:#fff;
 text-align:center;
 overflow:hidden;
}

/* Background Glow */
body::before{
 content:'';
 position:absolute;
 width:400px;
 height:400px;
 background:#ff1a1a;
 filter:blur(150px);
 top:10%;
 left:20%;
 opacity:0.3;
}

h1{
 font-size:50px;
 color:#ff1a1a;
 font-weight:800;
 letter-spacing:1px;
}

p{
 color:#bbb;
 margin-top:10px;
 margin-bottom:50px;
 font-size:18px;
}

/* Container */
.container{
 display:flex;
 gap:40px;
 flex-wrap:wrap;
 justify-content:center;
 z-index:1;
}

/* Cards */
.card{
 width:320px;          /* increased from 280px */
 height:250px;         /* increased from 220px */
 backdrop-filter:blur(10px);
 background:rgba(255,255,255,0.05);
 border-radius:15px;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 cursor:pointer;
 transition:0.4s;
 border:1px solid rgba(255,255,255,0.1);
 position:relative;
 overflow:hidden;
 padding:20px;         /* added for better spacing */
}

/* Hover Glow */
.card::before{
 content:'';
 position:absolute;
 width:100%;
 height:100%;
 background:linear-gradient(120deg,transparent,rgba(255,0,0,0.3),transparent);
 top:-100%;
 transition:0.5s;
}

.card:hover::before{
 top:100%;
}

.card:hover{
 transform:translateY(-10px) scale(1.05);
 box-shadow:0 0 30px rgba(255,0,0,0.5);
}

/* Text */
.card h2{
 color:#ff1a1a;
 font-size:22px;
 margin-bottom:10px;
}

.card p{
 font-size:14px;
 color:#ccc;
}

/* Button Effect */
.card span{
 margin-top:15px;
 font-size:13px;
 color:#ff1a1a;
 opacity:0;
 transition:0.3s;
}

.card:hover span{
 opacity:1;
}

/* Responsive */
@media(max-width:600px){
 h1{font-size:35px}
 .card{width:90%}
}
</style>
</head>

<body>

<h1>BVNAB Intelligence</h1>
<p>The Step Beyond in Intelligence</p>

<div class="container">

  <div class="card" onclick="location.href='industry.html'">
    <h2>Industry</h2>
    <p>Automation | Robotics | IIOT | AI Vision</p>
    <span>Explore →</span>
  </div>

  <div class="card" onclick="location.href='education.html'">
    <h2>Education</h2>
    <p>STEM | Training | Workshops | Innovation</p>
    <span>Explore →</span>
  </div>

</div>

</body>
</html>
