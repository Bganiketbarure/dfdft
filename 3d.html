<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>3D Printing - BVNAB</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{min-width:1200px;background:#0a0a0a;color:#fff}

.header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px}
.logo{display:flex;align-items:center;gap:10px}
.logo img{height:45px}
.back{color:#ff1a1a;text-decoration:none;border:1px solid #ff1a1a;padding:8px 16px;border-radius:20px}

h1{text-align:center;color:#ff1a1a;margin-top:10px}

/* MAIN LAYOUT */
.main{
 display:flex;
 width:85%;
 margin:40px auto;
 gap:30px;
 align-items:center;
}

/* LEFT IMAGE */
.image-box{
 flex:1;
}

.image-box img{
 width:100%;
 border-radius:15px;
}

/* RIGHT FORM */
.form-box{
 flex:1;
 background:rgba(255,255,255,0.05);
 padding:25px;
 border-radius:15px;
}

h2{color:#ff1a1a;margin-bottom:10px}

input, select{
 width:100%;
 padding:10px;
 margin-top:10px;
 background:#111;
 border:1px solid #333;
 color:#fff;
 border-radius:10px;
}

button{
 margin-top:15px;
 padding:12px;
 width:100%;
 background:#ff1a1a;
 border:none;
 color:#fff;
 border-radius:25px;
 cursor:pointer;
}

.features{
 width:85%;
 margin:30px auto;
 display:flex;
 gap:20px;
 flex-wrap:wrap;
}

.feature{
 flex:1;
 min-width:200px;
 background:#111;
 padding:15px;
 border-radius:10px;
 text-align:center;
}

</style>

<script>
function sendWhatsApp(){
 let name=document.getElementById('name').value;
 let material=document.getElementById('material').value;
 let color=document.getElementById('color').value;
 let message=`Hello, I want 3D Printing Service%0AName: ${name}%0AMaterial: ${material}%0AColor: ${color}%0A(I will attach my design file in WhatsApp)`;
 window.open(`https://wa.me/919356368018?text=${message}`,'_blank');
}
</script>

</head>

<body>

<div class="header">
 <div class="logo">
   <img src="Screenshot 2026-04-06 103500.png">
   <span>BVNAB</span>
 </div>
 <a href="stem.html" class="back">← Back</a>
</div>

<h1>3D Printing & Design Services</h1>

<div class="main">

 <!-- IMAGE SIDE -->
 <div class="image-box">
   <img src="OIP (1).webp">
 </div>

 <!-- FORM SIDE -->
 <div class="form-box">
   <h2>Quick Order</h2>
   <input type="text" id="name" placeholder="Your Name">
   <input type="file" id="file">

   <select id="material">
     <option>PLA</option>
     <option>ABS</option>
     <option>PETG</option>
   </select>

   <select id="color">
     <option>Red</option>
     <option>Black</option>
     <option>White</option>
     <option>Custom</option>
   </select>

   <button onclick="sendWhatsApp()">Send WhatsApp</button>
 </div>

</div>

<!-- FEATURES -->
<div class="features">
 <div class="feature">High Quality 3D Printing</div>
 <div class="feature">Multiple Materials & Colors</div>
 <div class="feature">Design to Product Support</div>
</div>

</body>
</html>
